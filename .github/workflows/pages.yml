name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/test-r1gfmp
  workflow_dispatch:

# Allow the workflow to enable Pages and publish the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns on GitHub Pages (build type "workflow")
        # automatically, so no manual Settings change is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
